<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
                <h1>QR Generator</h1>
            </div>
            <p class="subtitle">Instantly create QR codes for any URL</p>
        </header>

        <main>
            <div class="input-group">
                <label for="url-input">Enter URL</label>
                <div class="input-wrapper">
                    <input 
                        type="url" 
                        id="url-input" 
                        placeholder="https://example.com"
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="clear-btn" class="clear-btn" title="Clear input">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <button id="generate-btn" class="generate-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
                Generate QR Code
            </button>

            <div id="qr-container" class="qr-container hidden">
                <div class="qr-wrapper">
                    <canvas id="qr-canvas"></canvas>
                </div>
                <div class="qr-actions">
                    <button id="download-btn" class="action-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download PNG
                    </button>
                    <button id="copy-btn" class="action-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy to Clipboard
                    </button>
                </div>
            </div>

            <div id="error-message" class="error-message hidden"></div>
        </main>

        <footer>
            <p>No data stored • Generated instantly in your browser</p>
        </footer>
    </div>

    <script type="module" src="/script.js"></script>
</body>

<!-- Ramesh View (shown when route is /ramesh) -->
<div id="ramesh-view" class="ramesh-view hidden">
    <div class="container ramesh-container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
                <h1>Ramesh</h1>
            </div>
        </header>

        <main>
            <div class="ramesh-content">
                <p class="ramesh-text">Bazinga by Ramesh the lab technician</p>
                <div class="qr-wrapper ramesh-qr-wrapper">
                    <canvas id="ramesh-qr-canvas"></canvas>
                </div>
            </div>

            <div class="ramesh-nav">
                <a href="/" class="generate-btn" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Generator
                </a>
            </div>
        </main>

        <footer>
            <p>No data stored • Generated instantly in your browser</p>
        </footer>
    </div>
</div>
</html>
